<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f4f5f7" />
  <title>MeinTraining</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MeinTraining" />

  <link rel="stylesheet" href="./styles/app.css" />

  <!-- Bare-Imports (preact, htm) auf die lokal abgelegten Dateien mappen -->
  <script type="importmap">
  {
    "imports": {
      "preact": "./vendor/preact.module.js",
      "preact/hooks": "./vendor/hooks.module.js",
      "htm": "./vendor/htm.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./src/app.js"></script>
  <script>
    // Service-Worker registrieren → App wird offline-fähig
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((err) => {
          console.warn('Service-Worker konnte nicht registriert werden:', err);
        });
      });
    }
  </script>
</body>
</html>
